name: Auto Blog Post (二?3???먮룞 諛쒗뻾)

on:
  # 留ㅼ＜ ?붋룸ぉ쨌???쒓뎅?쒓컙 09:00 (UTC 00:00)
  schedule:
    - cron: '0 0 * * 2'   # ?붿슂??
    - cron: '0 0 * * 4'   # 紐⑹슂??
    - cron: '0 0 * * 6'   # ?좎슂??

  # ?섎룞 ?ㅽ뻾 ?덉슜
  workflow_dispatch:
    inputs:
      mode:
        description: '?ㅽ뻾 紐⑤뱶'
        required: true
        default: 'once'
        type: choice
        options:
          - once        # ?ㅼ젣 諛쒗뻾
          - dry-run     # 珥덉븞留??앹꽦

jobs:
  auto-post:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BLOG_GITHUB_TOKEN: ${{ secrets.BLOG_GITHUB_TOKEN }}
      BLOG_REPO: ajinnetworks/ajinnetworks.github.io
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      LOG_LEVEL: "INFO"

    steps:
      - name: 肄붾뱶 泥댄겕?꾩썐
        uses: actions/checkout@v4.2.2

      - name: Python 3.11 ?ㅼ젙
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: ?섏〈???ㅼ튂
        run: |
          pip install anthropic PyGithub python-frontmatter requests PyYAML python-dotenv schedule google-genai

      - name: .env ?뚯씪 ?앹꽦
        run: |
          cat > .env << EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          BLOG_GITHUB_TOKEN=${{ secrets.BLOG_GITHUB_TOKEN }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          BLOG_REPO=ajinnetworks/ajinnetworks.github.io
          HUMAN_GATE=false
          LOG_LEVEL=INFO
          PYTHONUTF8=1
          PYTHONIOENCODING=utf-8
          EOF

      - name: 釉붾줈洹??ъ뒪???먮룞 ?앹꽦 諛?諛쒗뻾
        run: |
          MODE="${{ github.event.inputs.mode || 'once' }}"
          echo "?ㅽ뻾 紐⑤뱶: $MODE"
          python scripts/run_agent.py --mode $MODE --platform github

      - name: ?ㅽ뻾 濡쒓렇 ?낅줈??
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: blog-logs-${{ github.run_number }}
          path: output/logs/
          retention-days: 30


